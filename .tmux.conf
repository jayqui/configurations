# Reload tmux config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# No delay for escape key press
set -sg escape-time 0

unbind-key C-b
set -g prefix C-a
bind-key C-a send-prefix

# Increase scrollback limit
set-option -g history-limit 60000

# Use the mouse to select and resize
set -g mouse on

# kill the session
bind D kill-session

# start index with 1. very un-dev
set -g base-index 1
setw -g pane-base-index 1

# moving b/w panes with Prefix h, j, k, l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# split panes with s and v
bind s split-window -v
bind v split-window -h
# or with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# resize panes with Prefix H, J, K, L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Select last pane with 'Ctrl-\'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
  "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
  "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

## Copy/Paste fix
# Use vim keybindings in copy mode
setw -g mode-keys vi
set-option -g status-keys vi

bind-key -Tcopy-mode-vi 'v' send -X begin-selection
bind-key -Tcopy-mode-vi 'y' send -X copy-selection


###### Status Bar ######
set -g status-left "#[fg=brightmagenta bg=default]#(git rev-parse --abbrev-ref HEAD)"

###### Colors ######

# allow more colors
set -g default-terminal "screen-256color"

# color pane border for clarity
setw -g pane-border-style fg=white,bg=default
setw -g pane-active-border-style fg=black,bg=white

# command line
set -g message-style fg=black,bold,bg=white

set -g status-fg white

# Jay's custom theme
set -g status-bg colour27
setw -g window-status-style fg=white,bg=colour27
setw -g window-status-current-style fg=black,bg=green

# Borders: no background at all
setw -g pane-border-style "fg=white"
setw -g pane-active-border-style "fg=white"

# Messages: no explicit bg
set -g message-style "fg=black,bold"

# Status line: minimal, with bg=default once
set -g status-style "bg=default,fg=white"
set -g status-left "#[fg=brightmagenta]#(git rev-parse --abbrev-ref HEAD)"
